<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard OVA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#07131d;
color:white;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}

select{
padding:10px;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>📊 Dashboard del Docente</h1>

<p>Visualización del rendimiento de estudiantes</p>

<h3>Seleccionar estudiante</h3>
<select id="selectorEstudiante" onchange="mostrarEstudiante()">
<option value="">Seleccione un estudiante</option>
</select>

<p id="infoEstudiante"></p>

<canvas id="graficoPuntaje"></canvas>

</div>

<script>

// 🔥 PEGA AQUÍ TU URL DEL WEB APP
let URL="https://script.google.com/macros/s/AKfycbwlj8-VREn6fDLBGHgGbUyZUz_PZ5tJ6BbRaUNr5hdsBJwQPw6apCGyEH_7c4xzxydV/exec"

let datosGlobal=[]

fetch(URL)
.then(res=>res.json())
.then(data=>{

data.shift() // elimina encabezados
datosGlobal=data

let selector=document.getElementById("selectorEstudiante")

// 🔥 evitar duplicados
let nombresUnicos=[...new Set(data.map(row=>row[0]))]

nombresUnicos.forEach((nombre,i)=>{
let option=document.createElement("option")
option.value=nombre
option.text=nombre
selector.appendChild(option)
})

})

.catch(()=>{
alert("Error conectando con Google Sheets")
})

/* =========================
   MOSTRAR ESTUDIANTE
========================= */

function mostrarEstudiante(){

let nombre=document.getElementById("selectorEstudiante").value
if(nombre==="") return

// 🔥 filtrar datos del estudiante
let datosEstudiante = datosGlobal.filter(d => d[0] === nombre)

// 🔥 separar diagnóstico y lecciones
let diagnostico = datosEstudiante.find(d => d[5] === "Diagnostico")
let lecciones = datosEstudiante.filter(d => d[5] !== "Diagnostico")

// 🔥 construir gráfica
let labels = ["Diagnóstico"]
let valores = [diagnostico ? Number(diagnostico[1]) : 0]

lecciones.forEach(l=>{
labels.push(l[5])
valores.push(Number(l[1]))
})

// 🔥 destruir gráfica anterior
if(window.grafico){
window.grafico.destroy()
}

// 🔥 crear gráfica
window.grafico = new Chart(document.getElementById("graficoPuntaje"), {
type:"line",
data:{
labels:labels,
datasets:[{
label:"Evolución del estudiante",
data:valores
}]
}
})

// 🔥 última lección para mostrar opinión
let ultima = lecciones[lecciones.length-1]

// 🔥 info del estudiante
document.getElementById("infoEstudiante").innerHTML=
`
<b>Nombre:</b> ${nombre}<br>
<b>Diagnóstico inicial:</b> ${diagnostico ? diagnostico[1] : "No registrado"}<br>
<b>Último puntaje:</b> ${ultima ? ultima[1] : "Sin datos"}<br>
<b>Opinión:</b> ${ultima ? ultima[3] : "Sin comentario"}
`

}

</script>

</body>
</html>
