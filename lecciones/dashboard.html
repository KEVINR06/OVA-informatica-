<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard OVA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#07131d;
color:white;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}

select{
padding:10px;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>📊 Dashboard del Docente</h1>

<p>Visualización del rendimiento de estudiantes</p>

<!-- 🔥 SELECTOR -->
<h3>Seleccionar estudiante</h3>
<select id="selectorEstudiante" onchange="mostrarEstudiante()">
<option value="">Seleccione un estudiante</option>
</select>

<p id="infoEstudiante"></p>

<canvas id="graficoPuntaje"></canvas>
<canvas id="graficoCalificacion"></canvas>

</div>

<script>

let URL="https://script.google.com/macros/s/AKfycby0qVtPHcZzsOVm45kEV2aLljMOxy9z8iUigDCPcqWxjqC1V4NSWE87JwwK8QQk0GA/exec" // 👈 TU LINK

let datosGlobal=[]

let graficoPuntaje = null
let graficoCalificacion = null

fetch(URL)
.then(res=>res.json())
.then(data=>{

data.shift() // elimina encabezados
datosGlobal=data

let selector=document.getElementById("selectorEstudiante")

data.forEach((row,i)=>{

let option=document.createElement("option")
option.value=i
option.text=row[0] // nombre
selector.appendChild(option)

})

})

/* 🔥 MOSTRAR ESTUDIANTE */

function mostrarEstudiante(){

let index=document.getElementById("selectorEstudiante").value

if(index==="") return

let estudiante=datosGlobal[index]

// 🔥 INFO DEL ESTUDIANTE
document.getElementById("infoEstudiante").innerHTML=
`
<b>Nombre:</b> ${estudiante[0]} <br>
<b>Puntaje:</b> ${estudiante[1]} <br>
<b>Progreso:</b> ${estudiante[2]} <br>
<b>Calificación:</b> ${estudiante[4]} <br>
<b>Lección:</b> ${estudiante[5] || "No definida"} <br><br>

<b>📝 Opinión:</b><br>
"${estudiante[3] || "Sin comentario"}"
`

/* 🔥 GRAFICO PUNTAJE INDIVIDUAL */

if(graficoPuntaje){
graficoPuntaje.destroy()
}

graficoPuntaje = new Chart(document.getElementById("graficoPuntaje"), {
type:"bar",
data:{
labels:["Puntaje"],
datasets:[{
label:"Puntaje del estudiante",
data:[estudiante[1]]
}]
}
})

/* 🔥 GRAFICO CALIFICACION INDIVIDUAL */

if(graficoCalificacion){
graficoCalificacion.destroy()
}

graficoCalificacion = new Chart(document.getElementById("graficoCalificacion"), {
type:"pie",
data:{
labels:["Calificación"],
datasets:[{
data:[estudiante[4], 5-estudiante[4]]
}]
}
})

}

</script>

</body>
</html>
