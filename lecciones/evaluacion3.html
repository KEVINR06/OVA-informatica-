
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Evaluación Final - OVA</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#07131d,#0e2734);
    color:white;
    display:flex;
    justify-content:center;
}

.container{
    width:80%;
    max-width:900px;
    margin:40px auto;
    background:#0e2734;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(66,255,191,0.3);
    text-align:center;
}

h1{
    color:#42ffbf;
}

img{
    width:200px;
    margin:20px 0;
}

.question{
    text-align:left;
    margin:25px 0;
    padding:20px;
    background:#07131d;
    border-radius:15px;
}

.question h3{
    color:#7dd8ff;
}

label{
    display:block;
    margin:8px 0;
    cursor:pointer;
}

input[type="radio"]{
    accent-color:#42ffbf;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#42ffbf;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#7dd8ff;
    transform:scale(1.05);
}

#resultado{
    margin-top:30px;
    padding:20px;
    border-radius:15px;
    font-size:18px;
}

.buena{
    background:rgba(66,255,191,0.2);
    border:2px solid #42ffbf;
}

.mala{
    background:rgba(255,80,80,0.2);
    border:2px solid #ff4d4d;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Evaluación Final</h1>

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">

<form id="quizForm">

<div class="question">
<h3>1. ¿Qué es un algoritmo?</h3>
<label><input type="radio" name="q1" value="1"> Secuencia de pasos</label>
<label><input type="radio" name="q1" value="0"> Imagen</label>
<label><input type="radio" name="q1" value="0"> Programa</label>
</div>

<div class="question">
<h3>2. ¿Qué es pseudocódigo?</h3>
<label><input type="radio" name="q2" value="1"> Representación lógica</label>
<label><input type="radio" name="q2" value="0"> Lenguaje real</label>
<label><input type="radio" name="q2" value="0"> Software</label>
</div>

<div class="question">
<h3>3. ¿Para qué sirve?</h3>
<label><input type="radio" name="q3" value="1"> Planear soluciones</label>
<label><input type="radio" name="q3" value="0"> Diseñar páginas</label>
<label><input type="radio" name="q3" value="0"> Jugar</label>
</div>

<div class="question">
<h3>4. ¿Qué indica "Inicio"?</h3>
<label><input type="radio" name="q4" value="1"> Comenzar</label>
<label><input type="radio" name="q4" value="0"> Terminar</label>
<label><input type="radio" name="q4" value="0"> Repetir</label>
</div>

<div class="question">
<h3>5. ¿Qué indica "Fin"?</h3>
<label><input type="radio" name="q5" value="1"> Terminar</label>
<label><input type="radio" name="q5" value="0"> Empezar</label>
<label><input type="radio" name="q5" value="0"> Leer</label>
</div>

<div class="question">
<h3>6. ¿Qué hace "Si... entonces"?</h3>
<label><input type="radio" name="q6" value="1"> Decisión</label>
<label><input type="radio" name="q6" value="0"> Repetición</label>
<label><input type="radio" name="q6" value="0"> Inicio</label>
</div>

<div class="question">
<h3>7. ¿Qué es "Leer"?</h3>
<label><input type="radio" name="q7" value="1"> Entrada</label>
<label><input type="radio" name="q7" value="0"> Salida</label>
<label><input type="radio" name="q7" value="0"> Decisión</label>
</div>

<div class="question">
<h3>8. ¿Qué es "Mostrar"?</h3>
<label><input type="radio" name="q8" value="1"> Salida</label>
<label><input type="radio" name="q8" value="0"> Entrada</label>
<label><input type="radio" name="q8" value="0"> Bucle</label>
</div>

<button type="button" onclick="calcular()">Finalizar Evaluación</button>
<br>
<button type="button" onclick="volverInicio()">⬅ Volver al OVA</button>

</form>

<div id="resultado"></div>

</div>

<script>

function calcular(){
    let total = 0;
    let preguntas = 8; // ✅ CORREGIDO

    for(let i=1; i<=preguntas; i++){
        let respuesta = document.querySelector('input[name="q'+i+'"]:checked');
        if(respuesta){
            total += parseInt(respuesta.value);
        }
    }

    let nota = (total/preguntas)*5;
    nota = nota.toFixed(1);

    let resultado = document.getElementById("resultado");

    if(nota >= 4.0){
        resultado.className = "buena";
        resultado.innerHTML = 
        "🎉 <b>¡Excelente desempeño!</b><br><br>" +
        "Tu nota final es: <b>"+nota+"</b><br><br>" +
        "Demuestras comprensión sólida y capacidad de análisis. Continúa así y sigue profundizando en los conceptos.";
    }
    else{
        resultado.className = "mala";
        resultado.innerHTML = 
        "📘 <b>Oportunidad de mejora</b><br><br>" +
        "Tu nota final es: <b>"+nota+"</b><br><br>" +
        "Te recomendamos revisar los conceptos clave y practicar ejercicios similares. La retroalimentación es parte del proceso de aprendizaje.";
    }
}
function volverInicio(){
    window.location.href = "../index.html";
}

</script>

</body>
</html>
