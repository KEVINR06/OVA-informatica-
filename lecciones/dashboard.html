<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard OVA - Nivel Tesis</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#07131d;
color:white;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#0e2734;
padding:20px;
border-radius:20px;
margin-top:20px;
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}

select{
padding:10px;
border-radius:10px;
margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<h1>📊 Dashboard Inteligente del OVA</h1>

<h3>Seleccionar estudiante</h3>
<select id="selectorEstudiante" onchange="analizarEstudiante()">
<option value="">Seleccione un estudiante</option>
</select>

<div class="card">
<p id="info"></p>
<p id="opinion"></p>
<p id="rendimiento"></p>
</div>

<canvas id="graficoEvolucion"></canvas>

</div>

<script>

let URL="PEGA_AQUI_TU_WEB_APP"

let datosGlobal=[]
let chart=null

fetch(URL)
.then(res=>res.json())
.then(data=>{

data.shift()
datosGlobal=data

let selector=document.getElementById("selectorEstudiante")

let nombresUnicos=[...new Set(data.map(x=>x[0]))]

nombresUnicos.forEach(nombre=>{
let option=document.createElement("option")
option.value=nombre
option.text=nombre
selector.appendChild(option)
})

})

function analizarEstudiante(){

let nombre=document.getElementById("selectorEstudiante").value
if(nombre==="") return

// 🔥 filtrar TODAS sus lecciones
let registros=datosGlobal.filter(x=>x[0]===nombre)

// ordenar por lección
registros.sort((a,b)=> a[5].localeCompare(b[5]))

let lecciones=[]
let puntajes=[]
let opiniones=[]

registros.forEach(r=>{
lecciones.push(r[5])
puntajes.push(Number(r[1]))
opiniones.push(r[3])
})

// 🔥 métricas
let promedio = puntajes.reduce((a,b)=>a+b,0)/puntajes.length
let ultima = puntajes[puntajes.length-1]
let ultimaOpinion = opiniones[opiniones.length-1]

// 🔥 rendimiento
let estado=""
if(promedio >= 80){
estado="🟢 Alto rendimiento"
}else if(promedio >= 50){
estado="🟡 Rendimiento medio"
}else{
estado="🔴 Bajo rendimiento"
}

// 🔥 mostrar info
document.getElementById("info").innerHTML=
`
<b>Estudiante:</b> ${nombre} <br>
<b>Promedio:</b> ${promedio.toFixed(1)} <br>
<b>Último puntaje:</b> ${ultima}
`

document.getElementById("opinion").innerHTML=
`<b>Última opinión:</b> ${ultimaOpinion}`

document.getElementById("rendimiento").innerHTML=
`<b>Estado:</b> ${estado}`


// 🔥 destruir gráfica anterior
if(chart) chart.destroy()

// 🔥 gráfica evolución
chart = new Chart(document.getElementById("graficoEvolucion"), {
type:"line",
data:{
labels:lecciones,
datasets:[{
label:"Evolución del puntaje",
data:puntajes,
fill:false,
tension:0.2
}]
}
})

}

</script>

</body>
</html>
